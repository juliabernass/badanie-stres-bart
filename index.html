<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eksperyment stres–BART</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f6f2; --surface:#fff; --surface-2:#f3f0ec; --text:#26231d; --muted:#6f6b64; --border:#d9d4cc; --primary:#0b6b72; --primary-2:#0f4d52; --danger:#9a2d3c; --ok:#2f6b3c; --shadow:0 10px 30px rgba(20,20,20,.08); --radius:18px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .wrap { max-width:980px; margin:0 auto; padding:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px; }
    h1,h2,h3 { margin:0 0 12px; line-height:1.15; } p { line-height:1.6; } .muted { color:var(--muted); }
    .row { display:flex; gap:16px; flex-wrap:wrap; } .row > * { flex:1 1 260px; }
    label { display:block; font-weight:600; margin:14px 0 8px; }
    input[type="text"], input[type="number"], select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:#fff; font:inherit; }
    button { border:0; border-radius:14px; padding:12px 18px; font:inherit; font-weight:600; cursor:pointer; background:var(--primary); color:white; }
    button.secondary { background:#ece8e1; color:var(--text); } button.danger { background:var(--danger); } button:disabled { opacity:.5; cursor:not-allowed; }
    .actions { display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }
    .question { padding:16px 0; border-top:1px solid #eee7df; } .question:first-child { border-top:0; }
    .scale { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; } .scale label { margin:0; font-weight:500; }
    .radioBox { display:flex; align-items:center; gap:6px; background:var(--surface-2); padding:10px 12px; border-radius:12px; }
    .progress { height:12px; background:#e8e2d9; border-radius:999px; overflow:hidden; margin:18px 0 8px; } .bar { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#5aa8ae); }
    .big { font-size:clamp(28px,5vw,54px); font-weight:700; letter-spacing:-.03em; margin:8px 0 18px; }
    .timer { font-size:18px; font-weight:700; color:var(--danger); } .feedback { min-height:34px; font-weight:700; margin-top:16px; }
    .taskBox { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:240px; background:linear-gradient(180deg,#fdfcf9,#f5f1eb); border:1px solid var(--border); border-radius:18px; padding:24px; }
    .sliderWrap { margin:24px 0; } input[type="range"] { width:100%; } .sliderLabels { display:flex; justify-content:space-between; color:var(--muted); font-size:14px; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#e8f1f2; color:var(--primary-2); font-size:13px; font-weight:600; }
    .bartArea { display:grid; grid-template-columns:1.2fr .8fr; gap:20px; align-items:start; }
    .balloonStage { min-height:420px; display:flex; align-items:center; justify-content:center; background:#f9f7f3; border:1px solid var(--border); border-radius:18px; position:relative; overflow:hidden; }
    .balloon { width:120px; height:150px; background:#d95865; border-radius:50% 50% 48% 48%; position:relative; transform-origin:center bottom; transition:transform .15s ease; box-shadow: inset -12px -18px 0 rgba(0,0,0,.07); }
    .balloon::after { content:""; position:absolute; left:50%; bottom:-34px; width:2px; height:34px; background:#8a8175; transform:translateX(-50%); }
    .balloon::before { content:""; position:absolute; top:22px; left:24px; width:22px; height:34px; border-radius:50%; background:rgba(255,255,255,.25); transform:rotate(18deg); }
    .pop { background:radial-gradient(circle,#6a1b24 0,#aa3948 30%,transparent 31%); width:180px; height:180px; border-radius:50%; }
    .stats { display:grid; gap:12px; } .stat { padding:14px; background:var(--surface-2); border-radius:14px; }
    .bartButtons { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; } .small { font-size:14px; } .good { color:var(--ok); } .bad { color:var(--danger); }
    @media (max-width:800px){ .bartArea{ grid-template-columns:1fr; } .wrap{ padding:14px; } .card{ padding:18px; } }
  </style>
</head>
<body>
  <div class="wrap"><div id="app" class="card"></div></div>
<script>

const app = document.getElementById('app');

// ZMIANA 1: Skala nastroju Wojciszke i Baryła (zastąpiona PANAS)

// ZMIANA 2: SNS zaktualizowane zgodnie z plikiem promotora (8 pozycji)
const SNS_ITEMS = [

  'Jak dobry/a jesteś w obliczaniu 15% napiwku?',

const state = {

function download(filename, content, type='text/plain;charset=utf-8'){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
function mean(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ZMIANA 3: Nowa funkcja renderConsent() wywoływana zamiast renderWelcome() na początku
function renderConsent(){
  app.innerHTML=`
    <span class="pill">Badanie naukowe</span>
    <h2>Informacja o badaniu</h2>
    <p>Dzień dobry,</p>
<p> Nazywam się Julia Bernaś i jestem studentką IV roku psychologii na Uniwersytecie SWPS we Wrocławiu. Serdecznie zapraszam do udziału w badaniu naukowym realizowanym w ramach mojej pracy magisterskiej, która powstaje pod kierownictwem naukowym dr. hab. Jakuba Traczyka.
Głównym celem niniejszego projektu jest analiza wpływu stresu na podejmowanie decyzji o charakterze ryzykownym. W badaniu wykorzystuję między innymi procedurę BART (Balloon Analogue Risk Task), czyli interaktywne zadanie polegające na pompowaniu wirtualnego balonu, które pozwala ocenić skłonność do podejmowania ryzyka w kontrolowanych warunkach. Udział w projekcie jest w pełni dobrowolny i potrwa około 15 minut, a w jego skład wchodzi krótki kwestionariusz oraz wspomniane zadanie komputerowe. </p>
<p>Procedura ma charakter całkowicie anonimowy, co oznacza, że wszystkie zebrane dane będą analizowane wyłącznie zbiorczo oraz statystycznie i zostaną wykorzystane tylko do celów naukowych oraz przygotowania pracy magisterskiej. W każdej chwili, bez podawania jakiejkolwiek przyczyny, może Pan/Pani wycofać się z udziału poprzez proste zamknięcie okna przeglądarki, co spowoduje całkowite usunięcie dotychczas wprowadzonych odpowiedzi. Udział w badaniu nie wiąże się z żadnym ryzykiem wykraczającym poza codzienne korzystanie z komputera.
Zaznaczając zgodę, oświadcza Pan/Pani, że zapoznał się z powyższymi informacjami, jest osobą pełnoletnią i wyraża świadomą oraz dobrowolną zgodę na udział w tym projekcie. Bardzo dziękuję za poświęcony czas i pomoc w realizacji moich badań magisterskich.</p>
    <div style="margin-top:20px;display:flex;align-items:flex-start;gap:10px">
      <input type="checkbox" id="consentCheck" style="width:auto;margin-top:4px;cursor:pointer">
      <label for="consentCheck" style="margin:0;font-weight:500;cursor:pointer">Zapoznałem/am się z powyższymi informacjami i wyrażam zgodę na udział w badaniu.</label>
    </div>
    <div class="actions">
      <button id="consentBtn" disabled>Przejdź do badania</button>
    </div>
  `;

function renderWelcome(){
  app.innerHTML=`<span class="pill">Badanie naukowe</span><h1>Wpływ stresu na percepcję prawdopodobieństwa i decyzje hazardowe</h1><p class="muted">Prosimy o wypełnienie kilku kwestionariuszy i wykonanie dwóch krótkich zadań.</p><div class="row"><div><label for="age">Wiek</label><input id="age" type="number" min="18" max="99" placeholder="np. 23" /></div><div><label for="gender">Płeć</label><select id="gender"><option value="">Wybierz</option><option>Kobieta</option><option>Mężczyzna</option><option>Inna</option><option>Nie chcę podawać</option></select></div></div><div class="actions"><button id="startBtn">Rozpocznij</button></div>`;
  document.getElementById('startBtn').onclick=()=>{
    const age=document.getElementById('age').value.trim();
    const gender=document.getElementById('gender').value;
    if(!age||!gender||gender==='Wybierz'){alert('Uzupełnij wiek i płeć.');return;}
    state.participantId='P'+Date.now()+'_'+Math.floor(Math.random()*9000+1000);
    state.age=age;
    state.gender=gender;
    renderNastroj(); // ZMIANA 1: było renderPANAS()
  };
}

function renderLikertPage(title, items, min, max, nextFn, targetKey, anchors=['Wcale','Bardzo'], instruction=''){
  const instrHtml = instruction ? `<p>${instruction}</p>` : `<p class="muted">Oceń każdą pozycję w skali ${min}-${max}. Wszystkie odpowiedzi są wymagane.</p>`;
  app.innerHTML=`<h2>${esc(title)}</h2>${instrHtml}<div id="questions"></div><div class="actions"><button id="nextBtn">Dalej</button></div>`;
  const q=document.getElementById('questions');
  items.forEach((item,idx)=>{
    const div=document.createElement('div');
    div.className='question';
    let radios='';
    for(let i=min;i<=max;i++){
      radios += `<label class="radioBox"><input type="radio" name="q${idx}" value="${i}"> ${i}</label>`;
    }
    div.innerHTML=`<div><strong>${idx+1}.</strong> ${esc(item)}</div><div class="small muted" style="margin-top:6px">${anchors[0]} - ${anchors[1]}</div><div class="scale">${radios}</div>`;
    q.appendChild(div);
  });
  document.getElementById('nextBtn').onclick=()=>{
    const ans={};
    for(let i=0;i<items.length;i++){
      const checked=document.querySelector(`input[name="q${i}"]:checked`);
      if(!checked){ alert('Uzupełnij wszystkie odpowiedzi.'); return; }
      ans[`item_${i+1}`]=Number(checked.value);
    }
    state[targetKey]=ans;
    nextFn();
  };
}

// ZMIANA 1: Przemianowana z renderPANAS na renderNastroj, używa NASTROJ_ITEMS i klucza 'nastroj'
function renderNastroj(){
  renderLikertPage(

// ZMIANA 2: Zaktualizowane zakotwiczenia i skala dla SNS
function renderSNS(){
  app.innerHTML=`<h2>Skala SNS</h2><p class="muted">Odpowiedz na poniższe pytania. Oceń każdą pozycję w skali 1-6. Wszystkie odpowiedzi są wymagane.</p><div id="questions"></div><div class="actions"><button id="nextBtn">Dalej</button></div>`;
  const q=document.getElementById('questions');
  const SNS_ANCHORS = [
    ['Wcale nie jestem dobry/a','Jestem bardzo dobry/a'],
    ['Wcale nie jestem dobry/a','Jestem bardzo dobry/a'],
    ['Wcale nie jestem dobry/a','Jestem bardzo dobry/a'],
    ['Wcale nie jestem dobry/a','Jestem bardzo dobry/a'],
    ['W ogóle nieprzydatne','Bardzo przydatne'],
    ['Zawsze wolę słowa','Zawsze wolę liczby'],
    ['Zawsze wolę procenty','Zawsze wolę słowa'],
    ['Nigdy','Bardzo często']
  ];
  SNS_ITEMS.forEach((item,idx)=>{
    const div=document.createElement('div');

function renderManipulationIntro(){
  const txt=state.condition==='stres' ? 'Za chwilę wykonasz krótkie zadanie arytmetyczne pod presją czasu. Staraj się odpowiadać szybko i dokładnie.' : 'Za chwilę wykonasz krótkie neutralne zadanie porządkowania. Wykonuj je spokojnie i możliwie dokładnie.';
  app.innerHTML=`<span class="pill">Warunek: ${state.condition}</span><h2>Zadanie wprowadzające</h2><p>${txt}</p><div class="actions"><button id="goManip">Start zadania</button></div>`;
  document.getElementById('goManip').onclick=()=>runManipulation(0);
}

function randomInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function runManipulation(index){
  const total=8;
  if(index>=total){ renderVASStress(); return; }
  if(state.condition==='stres'){
    const a=randomInt(13,58), b=randomInt(7,29), op=Math.random()<.5?'+':'-';
    const correct=op==='+'?a+b:a-b;
    const start=performance.now();
    let timeLeft=6;
    app.innerHTML=`<h2>Zadanie matematyczne</h2><div class="progress"><div class="bar" style="width:${(index/total)*100}%"></div></div><p class="muted">Próba ${index+1} z ${total}</p><div class="taskBox"><div class="timer" id="timer">Pozostały czas: ${timeLeft.toFixed(1)} s</div><div class="big">${a} ${op} ${b} = ?</div><input id="answer" type="number" inputmode="numeric" style="max-width:220px;text-align:center;font-size:28px;font-weight:700"><div class="feedback" id="feedback"></div><div class="actions"><button id="submitAnswer">Zatwierdź</button></div></div>`;
    const input=document.getElementById('answer');
    input.focus();
    let done=false;
    const timerEl=document.getElementById('timer');
    const tick=setInterval(()=>{
      timeLeft-=0.1;
      timerEl.textContent=`Pozostały czas: ${Math.max(0,timeLeft).toFixed(1)} s`;
      if(timeLeft<=0 && !done){ finish(null,true); }
    },100);
    function finish(value, timeout=false){
      if(done) return;
      done=true;
      clearInterval(tick);
      const rt=Math.round(performance.now()-start);
      const isCorrect=value!==null && Number(value)===correct;
      let feedback='';
      if(timeout){ feedback='Za wolno. Twój wynik jest poniżej przeciętnej.'; }
      else if(isCorrect){ feedback='Poprawnie, ale postaraj się odpowiadać szybciej.'; }
      else { feedback='Niepoprawnie. Jesteś wolniejsza/y niż większość osób.'; }
      state.stressTaskTrials.push({phase:'stress_math', trial:index+1, stimulus:`${a}${op}${b}`, correct_answer:correct, response:value ?? '', correct:isCorrect?1:0, rt_ms:rt, timeout:timeout?1:0, feedback});
      document.getElementById('feedback').textContent=feedback + ' (audio tykania można dodać w kolejnej wersji)';
      setTimeout(()=>runManipulation(index+1),1200);
    }
    document.getElementById('submitAnswer').onclick=()=>finish(document.getElementById('answer').value);
    document.getElementById('answer').onkeydown=(e)=>{ if(e.key==='Enter') finish(document.getElementById('answer').value); };
  } else {
    const wordSets=[
      ['baran','dom','echo'],
      ['igła','kot','las'],
      ['mapa','nos','okno'],
      ['para','ryba','słoń'],
      ['tama','ulga','wóz'],
      ['zegar','ark','but'],
      ['cień','dach','elf'],
      ['fala','głos','hart']
    ];
    const words=wordSets[index % wordSets.length];
    const shuffled=[...words].sort(()=>Math.random()-.5);
    const start=performance.now();
    app.innerHTML=`<h2>Zadanie porządkowania</h2><div class="progress"><div class="bar" style="width:${(index/total)*100}%"></div></div><p class="muted">Próba ${index+1} z ${total}</p><div class="taskBox"><p>Ułóż słowa w kolejności alfabetycznej:</p><div class="big" style="font-size:22px;letter-spacing:0">${shuffled.join(', ')}</div><input id="answer" type="text" placeholder="np. ${[...words].sort().join(', ')}" style="max-width:400px;text-align:center"><div class="feedback" id="feedback"></div><div class="actions"><button id="submitAnswer">Zatwierdź</button></div></div>`;
    const sortedAnswer=words.slice().sort().join(', ');
    document.getElementById('answer').focus();
    function finish(){
      const val=document.getElementById('answer').value.trim();
      const rt=Math.round(performance.now()-start);
      const isCorrect=val.toLowerCase()===sortedAnswer.toLowerCase();
      state.stressTaskTrials.push({phase:'control_sort', trial:index+1, stimulus:shuffled.join(','), correct_answer:sortedAnswer, response:val, correct:isCorrect?1:0, rt_ms:rt, timeout:0, feedback:''});
      setTimeout(()=>runManipulation(index+1),600);
    }
    document.getElementById('submitAnswer').onclick=finish;
    document.getElementById('answer').onkeydown=(e)=>{ if(e.key==='Enter') finish(); };
  }
}

function renderVASStress(){
  app.innerHTML=`<h2>Ocena stresu po zadaniu</h2><p>Proszę oceń, jak silny stres odczuwasz w tej chwili, po wykonaniu poprzedniego zadania.</p><div class="sliderWrap"><label for="stressRange">Poziom stresu: <span id="stressVal">50</span></label><input id="stressRange" type="range" min="0" max="100" value="50"><div class="sliderLabels"><span>0 - brak stresu</span><span>100 - maksymalny stres</span></div></div><div class="actions"><button id="toBart">Przejdź do zadania BART</button></div>`;
  const range=document.getElementById('stressRange');
  const val=document.getElementById('stressVal');
  range.oninput=()=>val.textContent=range.value;
  document.getElementById('toBart').onclick=()=>{ state.vasStress=Number(range.value); startBartIntro(); };
}

// ZMIANA 4a: Rozbudowana instrukcja BART
function startBartIntro(){
  app.innerHTML=`
    <h2>Zadanie BART – Pompowanie Balonu</h2>
    <p>Za chwilę rozpoczniesz główne zadanie eksperymentu. Przeczytaj uważnie poniższe instrukcje.</p>
    <div style="background:#f0f4f8;border-radius:14px;padding:20px 24px;margin:16px 0;border-left:4px solid var(--primary)">
      <h3 style="margin:0 0 10px">Na czym polega zadanie?</h3>
      <p style="margin:0 0 10px">Przed Tobą <strong>30 balonów</strong>. W każdej rundzie masz dwie opcje:</p>
      <ul style="margin:0 0 10px;padding-left:20px">
        <li><strong>Pompuj</strong> – każde pompnięcie zwiększa Twój potencjalny zysk o 0,05 pkt, ale też zwiększa ryzyko, że balon pęknie.</li>
        <li><strong>Zbierz punkty</strong> – kończysz rundę i zabierasz zgromadzone punkty na swoje konto. To bezpieczna opcja.</li>
      </ul>
      <p style="margin:0 0 10px"><strong>Jeśli balon pęknie</strong> – tracisz wszystkie punkty z tej rundy i przechodzisz do następnej.</p>
      <p style="margin:0"><strong>Cel:</strong> Zgromadź jak najwięcej punktów przez wszystkie 30 rund.</p>
    </div>
    <div style="background:#fff8e1;border-radius:14px;padding:16px 20px;margin:16px 0;border-left:4px solid #f9a825">
      <p style="margin:0"><strong>Ważne:</strong> W wybranych rundach, zanim zaczniesz pompować, zostaniesz poproszony/a o ocenę ryzyka związanego z całą rundą. Następnie w każdej rundzie przed każdym kolejnym pompnięciem będziesz mógł/mogła zdecydować, czy chcesz kontynuować, czy zebrać punkty.</p>
    </div>
    <p class="muted">Nie ma jednej prawidłowej strategii – postępuj tak, jak uważasz za słuszne.</p>
    <div class="actions"><button id="startBart">Rozumiem – rozpocznij zadanie</button></div>
  `;
  document.getElementById('startBart').onclick=()=>nextBalloon();
}

function nextBalloon(){
  state.currentBalloon += 1;
  if(state.currentBalloon>30){ renderDebrief(); return; }
  state.currentPumps=0;
  state.currentPotential=0;
  state.balloonExplodeAt=randomInt(1,128);
  if([1,6,11,16,21,26].includes(state.currentBalloon)) renderRiskRating();
  else renderBartTrial(false);
}

// ZMIANA 4c: Nowa funkcja renderRiskRating() z rozbudowanym pytaniem
function renderRiskRating(){
  app.innerHTML=`
    <h2>Ocena ryzyka – Runda ${state.currentBalloon}</h2>
    <p>Zanim zaczniesz pompować balon w tej rundzie, oceń poniższe kwestie.</p>
    <div style="background:#f0f4f8;border-radius:14px;padding:18px 22px;margin:16px 0">
      <p style="margin:0 0 8px"><strong>Wyobraź sobie, że masz pompować ten balon do momentu, gdy zdecydujesz się go zatrzymać lub aż do pęknięcia.</strong></p>
      <p style="margin:0;color:var(--muted)">Balon może pęknąć w dowolnym momencie – nie wiesz, kiedy to nastąpi. Każde pompnięcie zwiększa Twój zysk, ale też zbliża do momentu ewentualnego pęknięcia.</p>
    </div>
    <div class="question">
      <strong>Jak ryzykowny jest dla Ciebie cały proces pompowania tego balonu?</strong>
      <p class="muted small">Oceń, jak ryzykowne jest uczestniczenie w tej rundzie – biorąc pod uwagę możliwość pęknięcia i utratę punktów.</p>
      <div class="sliderWrap">
        <label for="riskRange">Twoja ocena: <span id="riskVal">50</span> / 100</label>
        <input id="riskRange" type="range" min="0" max="100" value="50">
        <div class="sliderLabels">
          <span>0 – wcale nie ryzykowne</span>
          <span>100 – bardzo ryzykowne</span>
        </div>
      </div>
    </div>
    <div class="actions"><button id="saveRisk">Dalej – zacznij rundę</button></div>
  `;
  const range=document.getElementById('riskRange');
  const val=document.getElementById('riskVal');
  range.oninput=()=>val.textContent=range.value;
  document.getElementById('saveRisk').onclick=()=>{
    state.bartRiskRatings.push({round:state.currentBalloon, rating:Number(range.value), timestamp:new Date().toISOString()});
    renderBartTrial(true);
  };
}

function renderBartTrial(hadRiskRating){
  state.decisionStart=performance.now();
  const scale=1+state.currentPumps*0.03;
  app.innerHTML=`<div class="bartArea"><div>
    <h2>Balon ${state.currentBalloon} / 30</h2>
    <div class="balloonStage"><div id="balloonShape" class="balloon" style="transform: scale(${scale})"></div></div>
    <div class="bartButtons">
      <button id="pumpBtn">Pompuj</button>
      <button id="collectBtn" class="secondary">Zbierz punkty</button>
    </div>
    <p id="bartMsg" class="small muted" style="margin-top:14px">Kliknij jedną z opcji.</p>
  </div>
  <div class="stats">
    <div class="stat"><strong>Aktualna runda</strong><br>Potencjalny zysk: <span id="potential">${state.currentPotential.toFixed(2)}</span></div>
    <div class="stat"><strong>Pompnięcia</strong><br><span id="pumps">${state.currentPumps}</span></div>
    <div class="stat"><strong>Suma punktów</strong><br><span id="earnings">${state.totalEarnings.toFixed(2)}</span></div>
    <div class="stat"><strong>Ocena ryzyka</strong><br>${hadRiskRating ? 'zebrana przed rundą' : 'brak w tej rundzie'}</div>
  </div></div>`;

  document.getElementById('pumpBtn').onclick=pumpBalloon;
  document.getElementById('collectBtn').onclick=collectBalloon;
}

function pumpBalloon(){
  state.currentPumps += 1;
  state.currentPotential += 0.05;
  document.getElementById('potential').textContent=state.currentPotential.toFixed(2);
  document.getElementById('pumps').textContent=state.currentPumps;
  document.getElementById('balloonShape').style.transform=`scale(${1 + state.currentPumps*0.03})`;
  if(state.currentPumps >= state.balloonExplodeAt){
    const rt=Math.round(performance.now()-state.decisionStart);
    state.bartTrials.push({
      round:state.currentBalloon, pumps:state.currentPumps,
      exploded:1, collected:0, round_earnings:0,
      total_earnings_after:Number(state.totalEarnings.toFixed(2)),
      first_decision_rt_ms:rt, explosion_point:state.balloonExplodeAt
    });
    document.getElementById('balloonShape').className='pop';
    document.getElementById('bartMsg').innerHTML='<span class="bad">Balon pękł. Punkty z tej rundy przepadły.</span>';
    document.getElementById('pumpBtn').disabled=true;
    document.getElementById('collectBtn').disabled=true;
    setTimeout(nextBalloon,1200);
  }
}

function collectBalloon(){
  const rt=Math.round(performance.now()-state.decisionStart);
  state.totalEarnings += state.currentPotential;
  state.bartTrials.push({
    round:state.currentBalloon, pumps:state.currentPumps,
    exploded:0, collected:1,
    round_earnings:Number(state.currentPotential.toFixed(2)),
    total_earnings_after:Number(state.totalEarnings.toFixed(2)),
    first_decision_rt_ms:rt, explosion_point:state.balloonExplodeAt
  });
  // Sprawdź czy elementy jeszcze istnieją (przy "Nie, zbieram 0 pkt" mogą nie być dostępne jako disabled)
  const earningsEl=document.getElementById('earnings');
  const bartMsgEl=document.getElementById('bartMsg');
  const pumpBtnEl=document.getElementById('pumpBtn');
  const collectBtnEl=document.getElementById('collectBtn');
  if(earningsEl) earningsEl.textContent=state.totalEarnings.toFixed(2);
  if(bartMsgEl) bartMsgEl.innerHTML='<span class="good">Punkty zostały zapisane.</span>';
  if(pumpBtnEl) pumpBtnEl.disabled=true;
  if(collectBtnEl) collectBtnEl.disabled=true;
  setTimeout(nextBalloon,700);
}

// ZMIANA 1: panasMean zmienione na nastroj, nagłówek kolumny: nastroj_mean
function buildSummaryCSV(){
  const panasMean=mean(Object.values(state.nastroj));
  const snsMean=mean(Object.values(state.sns));
  const adjusted=mean(state.bartTrials.filter(t=>!t.exploded).map(t=>t.pumps));
  const avgAll=mean(state.bartTrials.map(t=>t.pumps));
  const explosions=state.bartTrials.filter(t=>t.exploded).length;
  const meanRT=mean(state.bartTrials.map(t=>t.first_decision_rt_ms));
  const headers=['participant_id','started_at','condition','age','gender','nastroj_mean','sns_mean','vas_stress_post_task','bart_total_earnings','bart_total_explosions','bart_avg_pumps_all','bart_adjusted_avg_pumps','bart_mean_rt_ms'];
  const row=[state.participantId,state.startedAt,state.condition,state.age,state.gender,panasMean.toFixed(2),snsMean.toFixed(2),state.vasStress,state.totalEarnings.toFixed(2),explosions,avgAll.toFixed(2),adjusted.toFixed(2),meanRT.toFixed(0)];
  return headers.join(',')+'\n'+row.join(',');
}

function buildTrialsCSV(){
  const rows=[];
  rows.push(['participant_id','section','trial','stimulus','response','correct_answer','correct','rt_ms','timeout','feedback','round','pumps','exploded','collected','round_earnings','total_earnings_after','explosion_point','risk_rating'].join(','));
  state.stressTaskTrials.forEach(t=>rows.push([state.participantId,t.phase,t.trial,`"${t.stimulus}"`,`"${t.response}"`,t.correct_answer,t.correct,t.rt_ms,t.timeout,`"${t.feedback}"`,'','','','','','',''].join(',')));
  state.bartRiskRatings.forEach(r=>rows.push([state.participantId,'bart_risk_rating','','','','','','','','',r.round,'','','','','','',r.rating].join(',')));
  state.bartTrials.forEach(t=>rows.push([state.participantId,'bart_round','','','','','','','','',t.round,t.pumps,t.exploded,t.collected,t.round_earnings,t.total_earnings_after,t.explosion_point,''].join(',')));
  return rows.join('\n');
}

function renderDebrief(){
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({participantId:state.participantId,summary:buildSummaryCSV(),trials:buildTrialsCSV()})});
  const adjusted=mean(state.bartTrials.filter(t=>!t.exploded).map(t=>t.pumps));
  const debriefNote = state.condition==='stres' ? '<p>Negatywne komunikaty, które otrzymywałeś/aś podczas zadania matematycznego, były elementem procedury eksperymentalnej i nie stanowiły realnej oceny Twoich zdolności.</p>' : '';
  app.innerHTML=`<h2>Dziękujemy za udział!</h2>${debriefNote}<p><strong>Twój wynik BART:</strong> ${state.totalEarnings.toFixed(2)} punktów. Średnia liczba pompnięć dla niepękniętych balonów: ${adjusted.toFixed(2)}.</p><p class="muted">Twoje odpowiedzi zostały zapisane. Możesz zamknąć tę stronę.</p>`;
}

// ZMIANA 3: Wywołaj renderConsent() zamiast renderWelcome() na początku
renderConsent();
</script>
